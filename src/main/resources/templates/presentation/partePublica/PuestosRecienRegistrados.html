<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
  <title>Puestos Recién Registrados</title>
  <div th:replace="/presentation/fragmentos/head :: baseHead"></div>
  <link rel="stylesheet" th:href="@{/css/stylePublico.css}">
</head>
<body class="bg-light">

<div th:replace="/presentation/fragmentos/navPartePublica :: nav"></div>

<main>
  <div class="container mt-3">

    <h3>Bolsa de Empleo</h3>
    <p>Últimos 5 puestos disponibles</p>

    <div class="row g-3">

      <div class="col-4" th:each="p : ${puestos}">
        <div class="container mt-4 p-4 rounded shadow-sm" style="background-color:#EBFFEC;">

          <h5 th:text="${p.idEmpresa.nombre}"></h5>
          <p th:text="${p.descripcion}"></p>
          <p><b>$ <span th:text="${p.salario}"></span></b></p>
          <p class="text-muted" style="font-size:13px;">
            <b>₡ <span th:text="${#numbers.formatDecimal(p.salario * tipoCambio.venta, 0, 'COMMA', 2, 'POINT')}"></span></b>
          </p>

          <!-- Dropdown detalle -->
          <div class="dropdown">
            <button class="btn btn-outline-primary btn-sm dropdown-toggle"
                    data-bs-toggle="dropdown">
              Ver detalle
            </button>
            <ul class="dropdown-menu">
              <li class="dropdown-header"><b>Características requeridas</b></li>
              <li th:each="req : ${p.puestoRequisitos}">
                                <span class="dropdown-item">
                                    <span th:text="${req.idCaracteristica.nombre}"></span>
                                    — Nivel <span th:text="${req.nivel}"></span>
                                </span>
              </li>
              <li th:if="${#sets.isEmpty(p.puestoRequisitos)}">
                <span class="dropdown-item text-muted">Sin requisitos</span>
              </li>
            </ul>
          </div>

        </div>
      </div>

      <div th:if="${#lists.isEmpty(puestos)}">
        <p class="text-muted">No hay puestos disponibles.</p>
      </div>

    </div>
  </div>
</main>

<div th:replace="/presentation/fragmentos/footer :: footer"></div>

</body>
</html>
