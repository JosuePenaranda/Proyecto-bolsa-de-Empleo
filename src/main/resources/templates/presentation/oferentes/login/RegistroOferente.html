<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Empresa - Dashboard</title>

  <link rel="icon" type="image/png" th:href="@{/img/logobolsaempleo.png}">

  <link rel="stylesheet" th:href="@{/css/styleLogin.css}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdP..." crossorigin="anonymous">
</head>
<body class="bg-light">
<main>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

      <!-- Imagen -->
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img th:src="@{/img/logobolsaempleo.png}" class="logo" alt="Logo">
        BolsaEmpleo
      </a>

      <!-- Boton responsive -->
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Menu -->
      <div class="collapse navbar-collapse" id="menu">

        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="#">Buscar Puesto</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Registro Empresa</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Registro Oferente</a></li>
        </ul>

        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="#">Login</a>
          </li>
        </ul>

      </div>
    </div>
  </nav>

  <!-- Contenido de la página -->
  <div class="container d-flex justify-content-center" style="margin-top: 20px; margin-bottom: 20px">

    <div class="card shadow" style="width:700px;">

      <div class="card-header text-center bg-light">
        <h4>Registro Oferente</h4>
      </div>

      <div class="card-body bg-light">

        <!-- Foto -->
        <div class="text-center mb-4">
          <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png"
               width="80" alt="Usuario">
        </div>

        <form method="post">

          <div class="row">

            <div class="col-md-6 mb-3">
              <label class="form-label">Identificación</label>
              <input type="text" name="identificacion" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" name="nombre" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Primer Apellido</label>
              <input type="text" name="primerApellido" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Nacionalidad</label>
              <input type="text" name="nacionalidad" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Teléfono</label>
              <input type="text" name="telefono" class="form-control" inputmode="numeric">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Correo</label>
              <input type="email" name="correo" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Residencia</label>
              <input type="text" name="lugarResidencia" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" name="clave" class="form-control">
            </div>

          </div>

          <button type="submit" class="btn btn-primary w-100 mt-2">
            Registrarse
          </button>

        </form>

      </div>
    </div>
  </div>
  <!-- Footer -->
        <div class="card-footer text-center bg-light">
        </div>

      </div>
    </div>
  </div>
</main>
<footer class="bg-dark text-white p-3">
  <div class="container d-flex justify-content-between">
    <div>
      Bolsa de Empleo<br>
      <small>Total Soft Inc.</small>
    </div>

    <div class="text-end">
      Contacto info@bolsaempleo.local<br>
      Créditos Equipo de desarrollo
    </div>
  </div>
</footer>
</body>
</html>
