<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Empresa - Dashboard</title>

    <link rel="icon" type="image/png" th:href="@{/img/logobolsaempleo.png}">

    <link rel="stylesheet" th:href="@{/css/styleLogin.css}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdP..." crossorigin="anonymous">
</head>
<body class="bg-light">
<main>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <!-- Imagen -->
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img th:src="@{/img/logobolsaempleo.png}" class="logo" alt="Logo">
                BolsaEmpleo
            </a>

            <!-- Boton responsive -->
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/presentation/oferentes/empresa/dashboard}">Dashboard</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="#">Mis puestos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Publicar Puesto</a></li>
                </ul>

                <!-- correo usuario -->
                <span class="text-white me-3">correoelectonico@gmail.com</span>

                <!-- Boton salir -->
                <a class="btn btn-outline-light btn-sm" href="/">Salir</a>

            </div>
        </div>
    </nav>

    <!-- Contenido de la página -->
    <div class="container mt-2">

        <div class="container vh-100 d-flex justify-content-center align-items-center">

            <div class="card shadow" style="width:420px;">

                <div class="card-header text-center bg-light">
                    <h4>Login</h4>
                </div>

                <div class="card-body bg-light">

                    <div class="text-center mb-3">
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                             width="80" alt="">

                    </div>

                    <!-- FORM -->
                    <form th:action="@{/presentation/oferentes/login}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <label>
                                <input type="text" name="correo" class="form-control">
                            </label>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <label>
                                <input type="text" name="clave" class="form-control">
                            </label>
                        </div>

                            <button type="submit" class="btn btn-primary">
                                Entrar
                            </button>

                    </form>
            </div>

        <!-- Footer -->
        <div class="card-footer text-center bg-light">
        </div>

            </div>
        </div>
    </div>
</main>
<footer class="bg-dark text-white p-3">
    <div class="container d-flex justify-content-between">
        <div>
            Bolsa de Empleo<br>
            <small>Total Soft Inc.</small>
        </div>

        <div class="text-end">
            Contacto info@bolsaempleo.local<br>
            Créditos Equipo de desarrollo
        </div>
    </div>
</footer>
</body>
</html>
