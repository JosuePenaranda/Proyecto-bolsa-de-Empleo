<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Oferente - Dashboard</title>

    <div th:replace="/presentation/fragmentos/head :: baseHead"></div>

    <link rel="stylesheet" th:href="@{/css/styleOferente.css}">

</head>
<body>

    <!-- Nav -->
    <div th:replace="/presentation/fragmentos/navOferentes :: nav"></div>

<main>

    <!-- Contenido de la página -->
    <div class="container mt-3">

        <h3>Mis habilidades</h3>

        <div class="row g-3">

            <!-- COLUMNA 1 -->
            <div class="col-4">
                <div class="container mt-4 p-4 rounded shadow-sm" style="background-color:#EBFFEC;">
                    <div class="card p-3 bg-light">
                        <table class="table table-sm">
                            <thead>
                            <tr>
                                <th>Característica</th>
                                <th>Nivel</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr>
                                <td>Lenguajes de programación</td>
                                <td>4</td>
                            </tr>
                            <tr>
                                <td>Lenguajes de programación / Java</td>
                                <td>5</td>
                            </tr>
                            <tr>
                                <td>Tecnologías Web</td>
                                <td>4</td>
                            </tr>
                            <tr>
                                <td>Bases de Datos / Modelado</td>
                                <td>5</td>
                            </tr>
                            <tr>
                                <td>Testing / JUnit / Assertions</td>
                                <td>3</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- COLUMNA 2 -->
            <div class="col-4">
                <div class="container mt-4 p-4 rounded shadow-sm" style="background-color:#EBFFEC;">
                    <div class="card p-3 bg-light">

                        <p><b>Ruta:</b></p>

                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a href="#">Raíces</a></li>
                                <li class="breadcrumb-item"><a href="#">Testing</a></li>
                                <li class="breadcrumb-item active" aria-current="page">JUnit</li>
                            </ol>
                        </nav>

                        <p class="mt-3"><b>Subcategorías de: JUnit</b></p>

                        <ul class="list-group">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Assertions
                                <button class="btn btn-outline-primary btn-sm">Entrar</button>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Test cases
                                <button class="btn btn-outline-primary btn-sm">Entrar</button>
                            </li>
                        </ul>

                    </div>
                </div>
            </div>

            <!-- COLUMNA 3 -->
            <div class="col-4">
                <div class="container mt-4 p-4 rounded shadow-sm" style="background-color:#EBFFEC;">
                    <div class="card p-3">

                        <h6>Agregar Habilidad</h6>

                        <label class="form-label">Característica</label>
                        <label>
                            <select class="form-select">
                                <option>Test cases</option>
                                <option>Assertions</option>
                            </select>
                        </label>

                        <label class="form-label mt-2">Nivel (1-5)</label>
                        <label>
                            <input type="number" class="form-control" value="4">
                        </label>

                        <button class="btn btn-primary mt-3">Agregar</button>

                    </div>
                </div>
            </div>

        </div>

    </div>
</main>

<!-- FOOTER -->
<div th:replace="/presentation/fragmentos/footer :: footer"></div>

</body>
</html>
