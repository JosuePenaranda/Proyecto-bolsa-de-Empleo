<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Oferente - Mis Habilidades</title>

    <div th:replace="/presentation/fragmentos/head :: baseHead"></div>

    <link rel="stylesheet" th:href="@{/css/styleOferente.css}">

</head>
<body>

    <!-- Nav -->
    <div th:replace="/presentation/fragmentos/navOferentes :: nav"></div>

    <main>
        <div class="container mt-3">
            <h3>Mis habilidades</h3>
            <div class="row g-3">

                <!-- COLUMNA 1 - Lista de habilidades -->
                <div class="col-4">
                    <div class="container mt-4 p-4 rounded shadow-sm" style="background-color:#EBFFEC;">
                        <div class="card p-3 bg-light">
                            <table class="table table-sm">
                                <thead>
                                <tr>
                                    <th>Característica</th>
                                    <th>Nivel</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="h : ${habilidades}">
                                    <td th:text="${h.idCaracteristica.nombre}"></td>
                                    <td>
                                        <form method="post" th:action="@{/oferentes/actualizarHabilidad}"
                                              style="display:flex; gap:5px;">
                                            <input type="hidden" name="idHabilidad" th:value="${h.id}">
                                            <input type="number" name="nivel" th:value="${h.nivel}"
                                                   class="form-control form-control-sm" style="width:70px;"
                                                   min="1" max="10" required>
                                            <button class="btn btn-warning btn-sm">✎</button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(habilidades)}">
                                    <td colspan="2" class="text-muted">Sin habilidades</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- COLUMNA 2 - Navegación -->
                <div class="col-4">
                    <div class="container mt-4 p-4 rounded shadow-sm" style="background-color:#EBFFEC;">
                        <div class="card p-3 bg-light">

                            <p><b>Ruta:</b></p>
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb">
                                    <li class="breadcrumb-item">
                                        <a th:href="@{/oferentes/habilidades}">Raíces</a>
                                    </li>
                                    <li class="breadcrumb-item" th:each="nodo : ${ruta}">
                                        <a th:href="@{/oferentes/habilidades(actualId=${nodo.id})}"
                                           th:text="${nodo.nombre}"></a>
                                    </li>
                                </ol>
                            </nav>

                            <p th:if="${actual == null}">Categorías: <b>raíces</b></p>
                            <p th:if="${actual != null}">Subcategorías de: <b th:text="${actual.nombre}"></b></p>

                            <ul class="list-group">
                                <li class="list-group-item d-flex justify-content-between align-items-center"
                                    th:each="c : ${caracteristicas}">
                                    <b th:text="${c.nombre}"></b>
                                    <a th:href="@{/oferentes/habilidades(actualId=${c.id})}"
                                       class="btn btn-outline-primary btn-sm">Entrar</a>
                                </li>
                                <li class="list-group-item text-muted"
                                    th:if="${#lists.isEmpty(caracteristicas)}">
                                    Sin subcategorías
                                </li>
                            </ul>

                        </div>
                    </div>
                </div>

                <!-- COLUMNA 3 - Agregar habilidad (solo si es nodo hoja y hay un nodo actual) -->
                <div class="col-4" th:if="${esHoja && actual != null}">
                    <div class="container mt-4 p-4 rounded shadow-sm" style="background-color:#EBFFEC;">
                        <div class="card p-3">

                            <h6>Agregar Habilidad</h6>

                            <form method="post" th:action="@{/oferentes/habilidades}">
                                <input type="hidden" name="idCaracteristica" th:value="${actual.id}">

                                <p class="mt-2">Característica: <b th:text="${actual.nombre}"></b></p>

                                <input type="number" name="nivel" class="form-control mt-2"
                                       placeholder="Nivel (1-10)" min="1" max="10" required>

                                <button class="btn btn-primary mt-3 w-100">Agregar</button>
                            </form>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

<!-- FOOTER -->
<div th:replace="/presentation/fragmentos/footer :: footer"></div>

</body>
</html>
