<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title>Login</title>

    <div th:replace="/presentation/fragmentos/head :: baseHead"></div>

    <link rel="stylesheet" th:href="@{/css/styleLogin.css}">

</head>
<body class="bg-light">
<main>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <!-- Imagen -->
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img th:src="@{/img/logobolsaempleo.png}" class="logo" alt="Logo">
                BolsaEmpleo
            </a>

            <!-- Boton responsive -->
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/empresa/Puestosrecienregistrados}">Pagina Principal</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/empresa/Buscarpuesto}">Buscar Puestos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/empresa/Registroempresa}">Registro Empresa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/oferentes/Registrooferente}">Registro Oferente</a>
                    </li>
                </ul>

                <!-- Boton login -->
                <a th:href="@{/Login}">
                    <button class="btn btn-outline-light btn-sm">Login</button>
                </a>

            </div>
        </div>
    </nav>

    <!-- Contenido de la página -->
    <div class="container mt-5">

        <div class="container d-flex justify-content-center align-items-center">

            <div class="card shadow" style="width:420px;">

                <div class="card-header text-center bg-light">
                    <h4>Login</h4>
                </div>

                <div class="card-body bg-light">

                    <div class="text-center mb-3">
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                             width="80" alt="">

                    </div>

                    <form class="row g-3 needs-validation" novalidate
                          th:action="@{/Login}" method="post">

                        <div class="col-12">
                            <label class="form-label">Usuario</label>
                            <input type="text" name="correo" class="form-control" required>
                            <div class="invalid-feedback">
                                Por favor ingrese su usuario.
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="clave" class="form-control" required>
                            <div class="invalid-feedback">
                                Por favor ingrese su contraseña.
                            </div>
                        </div>

                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">Ingresar</button>
                        </div>

                    </form>

                    <!-- Modal de error -->
                    <div class="modal fade" id="exampleModal" tabindex="-1"
                         th:classappend="${hayError == 1} ? 'show d-block' : ''"
                         th:attr="aria-hidden=${hayError == 1} ? 'false' : 'true'">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h1 class="modal-title fs-5">Error</h1>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <p th:text="${error}"></p>
                                </div>
                                <div class="modal-footer">
                                    <div class="modal-footer border-0">
                                        <a th:href="@{/Login}" class="btn btn-primary">Cerrar</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Fondo oscuro del modal -->
                    <div class="modal-backdrop fade show" th:if="${hayError == 1}"></div>
            </div>

        <!-- Footer -->
        <div class="card-footer text-center bg-light">
        </div>

            </div>
        </div>
    </div>
</main>

<!-- FOOTER -->
<div th:replace="/presentation/fragmentos/footer :: footer"></div>

</body>
</html>
