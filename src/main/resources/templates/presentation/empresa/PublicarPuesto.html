<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title>Empresa - Publicar Puesto</title>

    <div th:replace="/presentation/fragmentos/head :: baseHead"></div>

    <link rel="stylesheet" th:href="@{/css/styleLogin.css}">

</head>

<body class="bg-light">

<!-- Nav -->
<div th:replace="/presentation/fragmentos/navEmpresa :: nav"></div>

<main>

    <!-- FORM -->
    <div class="container d-flex justify-content-center mt-4 mb-4">

        <div class="card shadow" style="width:700px;">

            <div class="card-header text-center bg-light">
                <h4>Publicar Puesto</h4>
            </div>

            <div class="card-body bg-light">
                <div class="alert alert-danger" th:if="${error != null}" th:text="${error}"></div>
                <form method="post" th:action="@{/empresa/PublicarPuesto}">

                    <!-- Cantidad de características -->
                    <div class="mb-3">
                        <select name="cantidad" class="form-select" th:onchange="'this.form.action=\'' + @{/empresa/PublicarPuesto} + '\'; this.form.method=\'get\'; this.form.submit();'">
                            <option value="" disabled selected>¿Cuántas características requiere?</option>
                            <option value="0" th:selected="${cantidad == 0}">Ninguna</option>
                            <option th:each="n : ${#numbers.sequence(1, 6)}"
                                    th:value="${n}"
                                    th:text="${n}"
                                    th:selected="${n == cantidad}">
                            </option>
                        </select>
                    </div>

                    <!-- Características (solo aparecen si eligió cantidad mayor a 0) -->
                    <div class="mb-3" th:if="${cantidad != null and cantidad > 0}">
                        <div class="row mb-2" th:each="i : ${#numbers.sequence(1, cantidad)}">
                            <div class="col">
                                <select name="caracteristicas[]" class="form-select">
                                    <option value="" disabled selected>Característica requerida</option>
                                    <option th:each="c : ${caracteristicas}"
                                            th:value="${c.id}"
                                            th:text="${c.nombre}">
                                    </option>
                                </select>
                            </div>
                            <div class="col">
                                <input type="number" name="niveles[]" class="form-control" placeholder="Nivel (1-10)">
                            </div>
                        </div>
                    </div>

                    <!-- Descripción -->
                    <div class="mb-3">
                        <textarea name="descripcion" class="form-control" rows="3" placeholder="Descripción del puesto" required></textarea>
                    </div>

                    <!-- Salario -->
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" name="salario" class="form-control" placeholder="Salario ofrecido en dólares" required>
                            <span class="input-group-text">USD</span>
                        </div>
                    </div>

                    <!-- Tipo -->
                    <div class="mb-3">
                        <select name="tipo" class="form-select">
                            <option value="" disabled selected>Tipo de publicación</option>
                            <option value="PUBLICA">Público</option>
                            <option value="PRIVADA">Privado</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-2" th:if="${cantidad != null}">
                        Publicar Puesto
                    </button>
                </form>


                <!-- MODAL -->
                <div class="modal fade" id="modalExito" tabindex="-1"
                     th:classappend="${hayMensaje == 1} ? 'show d-block' : ''"
                     th:attr="aria-hidden=${hayMensaje == 1} ? 'false' : 'true'">

                    <div class="modal-dialog">
                        <div class="modal-content">

                            <div class="modal-header">
                                <h5 class="modal-title">Puesto publicado</h5>
                            </div>

                            <div class="modal-body">
                                <p th:text="${mensaje}"></p>
                            </div>

                            <div class="modal-footer">
                                <a th:href="@{/empresa/dashboard}" class="btn btn-primary">Cerrar</a>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="modal-backdrop fade show" th:if="${hayMensaje == 1}"></div>

            </div>
        </div>
    </div>

</main>

<!-- FOOTER -->
<div th:replace="/presentation/fragmentos/footer :: footer"></div>

</body>
</html>
