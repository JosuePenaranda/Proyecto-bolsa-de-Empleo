<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title>Empresa - Buscar Candidatos</title>

    <div th:replace="/presentation/fragmentos/head :: baseHead"></div>

    <link rel="stylesheet" th:href="@{/css/styleEmpresa.css}">

</head>
<body>

    <!-- Nav -->
    <div th:replace="/presentation/fragmentos/navEmpresa :: nav"></div>

<main>

    <!-- Contenido de la página -->
    <div class="container mt-2">

        <br/>
        <h3>Candidatos para el puesto</h3>
        <p><b>Puesto:</b> <span th:text="${puesto != null} ? ${puesto.descripcion} : ''"></span></p>

        <table class="table table-striped">
            <thead class="table-white bg-dark text-white">
            <tr>
                <th>Oferente</th>
                <th>Requerimientos cumplidos</th>
                <th>% Coincidencia</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="oferente : ${oferentes}">
                <td th:text="${oferente.nombre + ' ' + oferente.primerApellido}"></td>
                <td th:text="${cumplidos != null ? cumplidos[oferente.identificacion] + '/' + totalRequisitos : '-'}"></td>
                <td>
                <span th:text="${porcentajes[oferente.identificacion] != null
                    ? #numbers.formatDecimal(porcentajes[oferente.identificacion],1,2) + '%' : '-'}"></span>
                </td>
                <td>
                    <a th:href="@{/empresa/VerDetalle(idOferente=${oferente.identificacion}, idPuesto=${puesto != null ? puesto.id : null})}" class="btn btn-outline-primary btn-sm">
                        Ver Detalle
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <a th:href="@{/empresa/MisPuestos}" class="btn btn-outline-primary btn-sm">
            Volver
        </a>

    </div>
</main>

<!-- FOOTER -->
<div th:replace="/presentation/fragmentos/footer :: footer"></div>

</body>
</html>
