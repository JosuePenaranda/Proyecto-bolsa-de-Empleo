<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title>Empresa - Mis Puestos</title>

    <div th:replace="/presentation/fragmentos/head :: baseHead"></div>

    <link rel="stylesheet" th:href="@{/css/styleEmpresa.css}">

</head>
<body>

<!-- Nav -->
<div th:replace="/presentation/fragmentos/navEmpresa :: nav"></div>

<main>

    <!-- Contenido de la página -->
    <div class="container mt-2">

        <h3>Mis puestos</h3>

        <a th:href="@{/empresa/PublicarPuesto}" class="btn btn-primary btn-sm">
            Publicar puesto
        </a>

        <br/>

        <table class="table table-striped">

            <thead class="table-white bg-dark text-white">
            <tr>
                <th>ID</th>
                <th>Descripción</th>
                <th>Salario</th>
                <th>Activo</th>
                <th>Acciones</th>
                <th>Buscar Candidatos</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="puesto : ${puestos}">
                <td th:text="${puesto.id}"></td>
                <td th:text="${puesto.descripcion}"></td>
                <td th:text="${puesto.salario}"></td>
                <td>
                    <button th:if="${puesto.activo}" class="btn btn-success btn-sm">Sí</button>
                    <button th:unless="${puesto.activo}" class="btn btn-danger btn-sm">No</button>
                </td>
                <td>
                    <!-- Desactivar (solo si está activo) -->
                    <form th:if="${puesto.activo}" th:action="@{/empresa/DesactivarPuesto}" method="post" style="display:inline">
                        <input type="hidden" name="id" th:value="${puesto.id}"/>
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            Desactivar
                        </button>
                    </form>

                    <!-- Activar (solo si está inactivo) -->
                    <form th:unless="${puesto.activo}" th:action="@{/empresa/ActivarPuesto}" method="post" style="display:inline">
                        <input type="hidden" name="id" th:value="${puesto.id}"/>
                        <button type="submit" class="btn btn-outline-success btn-sm">
                            Activar
                        </button>
                    </form>
                </td>
                <td>
                    <a th:href="@{/empresa/BuscarCandidatos(idPuesto=${puesto.id})}" class="btn btn-primary btn-sm">
                        Buscar Candidatos
                    </a>
                </td>
            </tr>
            </tbody>

        </table>

    </div>
</main>

<!-- FOOTER -->
<div th:replace="/presentation/fragmentos/footer :: footer"></div>

</body>
</html>
