<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Admin - Características</title>

    <div th:replace="/presentation/fragmentos/head :: baseHead"></div>

    <link rel="stylesheet" th:href="@{/css/styleAdministrador.css}">

</head>
<body>
    <!-- Nav -->
    <div th:replace="/presentation/fragmentos/navAdministrador :: nav"></div>

<main>

    <!-- Contenido de la página -->
    <div class="container mt-3">

        <h3>Características</h3>

        <div class="row g-3">

            <!-- COLUMNA 1 -->
            <div class="col-7">
                <div class="container mt-4 p-4 rounded shadow-sm" style="background-color:#EBFFEC;">
                    <div class="card p-3 bg-light">

                        <p><b>Ruta:</b></p>

                        <!-- Breadcrumb dinámico -->
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item">
                                    <a th:href="@{/administrador/AdminCaracteristicas}">Raíces</a>
                                </li>
                                <li class="breadcrumb-item" th:each="nodo : ${ruta}">
                                    <a th:href="@{/administrador/AdminCaracteristicas(actualId=${nodo.id})}"
                                       th:text="${nodo.nombre}"></a>
                                </li>
                            </ol>
                        </nav>

                        <!-- Categoría actual -->
                        <p th:if="${actual == null}">Categorías: <b>raíces</b></p>
                        <p th:if="${actual != null}">Subcategorías de: <b th:text="${actual.nombre}"></b></p>

                        <!-- Lista -->
                        <div class="lista-scroll">
                            <ul class="list-group">
                                <li class="list-group-item d-flex justify-content-between align-items-center"
                                    th:each="c : ${caracteristicas}">
                                    <b th:text="${c.nombre}"></b>
                                    <a th:href="@{/administrador/AdminCaracteristicas(actualId=${c.id})}"
                                       class="btn btn-outline-primary btn-sm">Entrar</a>
                                </li>
                                <li class="list-group-item text-muted"
                                    th:if="${#lists.isEmpty(caracteristicas)}">
                                    Sin subcategorías
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- COLUMNA 2 -->
            <div class="col-5">
                <div class="container mt-4 p-4 rounded shadow-sm" style="background-color:#EBFFEC;">
                    <div class="card p-3">

                        <h6>Agregar Característica</h6>

                        <form method="post" th:action="@{/administrador/crearCaracteristica}">
                            <input type="hidden" name="actualId" th:value="${actual != null ? actual.id : null}">

                            <label class="form-label mt-2">Nombre</label>
                            <input type="text" name="nombre" class="form-control" required>


                            <label class="form-label mt-2">Padre</label>
                                <select name="idPadre" class="form-select">
                                    <option value="">(sin padre)</option>
                                    <option th:each="c : ${todas}"
                                            th:value="${c.id}"
                                            th:text="${c.nombre}"
                                            th:selected="${actual != null && actual.id == c.id}">
                                    </option>
                                </select>

                            <button class="btn btn-primary mt-3 me-auto">Crear</button>
                        </form>

                    </div>
                </div>
            </div>

        </div>

    </div>
</main>

<!-- FOOTER -->
<div th:replace="/presentation/fragmentos/footer :: footer"></div>

</body>
</html>
