<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Admin - Reportes</title>
    <link rel="icon" type="image/png" th:href="@{/img/logobolsaempleo.png}">
    <link rel="stylesheet" th:href="@{/css/styleAdministrador.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<main>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img th:src="@{/img/logobolsaempleo.png}" class="logo" alt="Logo">
                BolsaEmpleo
            </a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/administrador/dashboard}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/administrador/AdminEmpresasPendientes}">Empresas Pendientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/administrador/AdminOferentesPendientes}">Oferentes Pendientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/administrador/AdminCaracteristicas}">Características</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/administrador/Reportes}">Reportes</a>
                    </li>
                </ul>
                <span class="text-white me-3" th:text="${correoUsuario}"></span>
                <a class="btn btn-outline-light btn-sm" href="/salir">Salir</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>Reporte de Puestos por Mes</h3>
        <p class="text-muted">Seleccioná el mes y año para generar el PDF.</p>

        <div class="card shadow-sm mt-3" style="max-width: 460px;">
            <div class="card-body">
                <form th:action="@{/administrador/Reportes/pdf}" method="get" target="_blank">
                    <div class="mb-3">
                        <label for="mes" class="form-label fw-semibold">Mes</label>
                        <select id="mes" name="mes" class="form-select">
                            <option value="1"  th:selected="${mesActual == 1}">Enero</option>
                            <option value="2"  th:selected="${mesActual == 2}">Febrero</option>
                            <option value="3"  th:selected="${mesActual == 3}">Marzo</option>
                            <option value="4"  th:selected="${mesActual == 4}">Abril</option>
                            <option value="5"  th:selected="${mesActual == 5}">Mayo</option>
                            <option value="6"  th:selected="${mesActual == 6}">Junio</option>
                            <option value="7"  th:selected="${mesActual == 7}">Julio</option>
                            <option value="8"  th:selected="${mesActual == 8}">Agosto</option>
                            <option value="9"  th:selected="${mesActual == 9}">Septiembre</option>
                            <option value="10" th:selected="${mesActual == 10}">Octubre</option>
                            <option value="11" th:selected="${mesActual == 11}">Noviembre</option>
                            <option value="12" th:selected="${mesActual == 12}">Diciembre</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label for="anio" class="form-label fw-semibold">Año</label>
                        <input type="number" id="anio" name="anio" class="form-control"
                               th:value="${anioActual}" min="2020" max="2099" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        Generar y Descargar Reporte PDF
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer class="bg-dark text-white p-3">
    <div class="container d-flex justify-content-between">
        <div>
            Bolsa de Empleo<br>
            <small>Total Soft Inc.</small>
        </div>
        <div class="text-end">
            Contacto info@bolsaempleo.local<br>
            Créditos Equipo de desarrollo
        </div>
    </div>
</footer>
</body>
</html>
