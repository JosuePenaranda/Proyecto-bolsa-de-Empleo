<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title>Admin - Reportes</title>

    <div th:replace="/presentation/fragmentos/head :: baseHead"></div>

    <link rel="stylesheet" th:href="@{/css/styleAdministrador.css}">

</head>
<body>

    <!-- Nav -->
    <div th:replace="/presentation/fragmentos/navAdministrador :: nav"></div>

<main>

    <div class="container mt-4">
        <h3>Reporte de Puestos por Mes</h3>
        <p class="text-muted">Seleccioná el mes y año para generar el PDF.</p>

        <div class="card shadow-sm mt-3" style="max-width: 460px;">
            <div class="card-body">
                <form th:action="@{/administrador/Reportes/pdf}" method="get" target="_blank">
                    <div class="mb-3">
                        <label for="mes" class="form-label fw-semibold">Mes</label>
                        <select id="mes" name="mes" class="form-select">
                            <option value="1"  th:selected="${mesActual == 1}">Enero</option>
                            <option value="2"  th:selected="${mesActual == 2}">Febrero</option>
                            <option value="3"  th:selected="${mesActual == 3}">Marzo</option>
                            <option value="4"  th:selected="${mesActual == 4}">Abril</option>
                            <option value="5"  th:selected="${mesActual == 5}">Mayo</option>
                            <option value="6"  th:selected="${mesActual == 6}">Junio</option>
                            <option value="7"  th:selected="${mesActual == 7}">Julio</option>
                            <option value="8"  th:selected="${mesActual == 8}">Agosto</option>
                            <option value="9"  th:selected="${mesActual == 9}">Septiembre</option>
                            <option value="10" th:selected="${mesActual == 10}">Octubre</option>
                            <option value="11" th:selected="${mesActual == 11}">Noviembre</option>
                            <option value="12" th:selected="${mesActual == 12}">Diciembre</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label for="anio" class="form-label fw-semibold">Año</label>
                        <input type="number" id="anio" name="anio" class="form-control"
                               th:value="${anioActual}" min="2020" max="2099" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        Generar y Descargar Reporte PDF
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<<!-- FOOTER -->
<div th:replace="/presentation/fragmentos/footer :: footer"></div>

</body>
</html>
